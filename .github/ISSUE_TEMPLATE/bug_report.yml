name: Bug report
description: Report a reproducible problem in this Pi extension
title: "bug: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve this Pi extension. Please avoid sharing secrets, tokens, private prompts, or machine-local paths.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen.
      placeholder: The extension failed to...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest set of steps or commands that reproduces the issue.
      placeholder: |
        1. Install/configure ...
        2. Run /your-command ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version or commit
      placeholder: npm package version, git tag, or commit SHA
    validations:
      required: true
  - type: input
    id: pi-version
    attributes:
      label: Pi version
      placeholder: Output from pi --version, if available
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: Output from node --version
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or diagnostics
      description: Paste relevant output. Redact secrets and private content.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I removed or redacted secrets, private prompts, and unrelated personal paths.
          required: true
